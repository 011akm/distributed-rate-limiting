services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - app1
      - app2

  app1:
    build: .
    environment:
      - PORT=3000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WINDOW_SIZE_MS=60000
      - MAX_REQUESTS=5
    depends_on:
      - redis

  app2:
    build: .
    environment:
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - WINDOW_SIZE_MS=60000
      - MAX_REQUESTS=5
    depends_on:
      - redis

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"